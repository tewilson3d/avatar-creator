<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Pipeline — Gemini Image Processor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
  .header { padding: 24px 32px; border-bottom: 1px solid #222; }
  .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .panel { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 20px; min-height: 400px; display: flex; flex-direction: column; }
  .panel-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 16px; }
  .drop-zone { flex: 1; border: 2px dashed #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: #4f9eff; background: rgba(79,158,255,0.05); }
  .drop-zone.has-image { border-style: solid; border-color: #333; }
  .drop-zone img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .drop-text { text-align: center; color: #555; }
  .drop-text svg { display: block; margin: 0 auto 12px; }
  .drop-text p { font-size: 14px; }
  .drop-text span { font-size: 12px; color: #444; }
  input[type="file"] { display: none; }
  .output-area { flex: 1; border-radius: 8px; background: #0d0d0d; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  .output-area img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; margin-top: 16px; }
  .btn-primary { background: #4f9eff; color: #fff; }
  .btn-primary:hover { background: #3a8fee; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .prompt-section { margin-top: 24px; }
  .prompt-label { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 8px; }
  .prompt-field { width: 100%; min-height: 100px; padding: 14px; background: #141414; border: 1px solid #222; border-radius: 8px; color: #e0e0e0; font-family: inherit; font-size: 14px; line-height: 1.5; resize: vertical; outline: none; transition: border-color 0.2s; }
  .prompt-field:focus { border-color: #4f9eff; }
  .prompt-field::placeholder { color: #444; }
  .btn-row { display: flex; justify-content: center; gap: 12px; }
  .spinner { display: none; width: 32px; height: 32px; border: 3px solid #333; border-top-color: #4f9eff; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status { text-align: center; font-size: 13px; color: #888; margin-top: 12px; min-height: 20px; }
  .status.error { color: #ff5555; }
  .status.success { color: #50fa7b; }
  @media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="header">
  <h1>🧑‍🎨 Avatar Pipeline — Step 1</h1>
  <p>Upload a character image → Gemini removes background → Clean image for 3D generation</p>
</div>
<div class="container">
  <div class="panels">
    <div class="panel">
      <div class="panel-title">Input Image</div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-text" id="dropText">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5"><path d="M12 16V4m0 0l-4 4m4-4l4 4"/><path d="M2 17l.621 2.485A2 2 0 004.561 21h14.878a2 2 0 001.94-1.515L22 17"/></svg>
          <p>Drop image here or click to upload</p>
          <span>PNG, JPG, WEBP</span>
        </div>
      </div>
      <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp">
    </div>
    <div class="panel">
      <div class="panel-title">Processed Output</div>
      <div class="output-area" id="outputArea">
        <div class="spinner" id="spinner"></div>
        <img id="outputImg" style="display:none">
      </div>
    </div>
  </div>
  <div class="prompt-section">
    <div class="prompt-label">Gemini Prompt</div>
    <textarea class="prompt-field" id="promptField" placeholder="Instructions for Gemini image processing...">Edit this image: Remove the entire background and replace it with a plain solid white background. Keep the character exactly as they are — same pose, same proportions, same details, same colors. Do not change, crop, or alter the character in any way. The output should be the full character cleanly isolated on a pure white (#FFFFFF) background, suitable as input for an AI 3D model generator.</textarea>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="processBtn" disabled>⚡ Process with Gemini</button>
  </div>
  <div class="status" id="status"></div>
</div>
<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const dropText = document.getElementById('dropText');
const processBtn = document.getElementById('processBtn');
const spinner = document.getElementById('spinner');
const outputImg = document.getElementById('outputImg');
const statusEl = document.getElementById('status');
let selectedFile = null;

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  selectedFile = file;
  const url = URL.createObjectURL(file);
  dropZone.classList.add('has-image');
  dropZone.innerHTML = `<img src="${url}">`;
  processBtn.disabled = false;
  outputImg.style.display = 'none';
  statusEl.textContent = '';
  statusEl.className = 'status';
}

processBtn.addEventListener('click', async () => {
  if (!selectedFile) return;
  processBtn.disabled = true;
  spinner.style.display = 'block';
  outputImg.style.display = 'none';
  statusEl.textContent = 'Sending to Gemini...';
  statusEl.className = 'status';

  const formData = new FormData();
  formData.append('image', selectedFile);
  formData.append('prompt', document.getElementById('promptField').value);

  try {
    const resp = await fetch('/api/process', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.success) {
      outputImg.src = 'data:image/png;base64,' + data.image;
      outputImg.style.display = 'block';
      statusEl.textContent = 'Done! Background removed.';
      statusEl.className = 'status success';
    } else {
      statusEl.textContent = 'Error: ' + (data.error || 'Unknown error');
      statusEl.className = 'status error';
    }
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    statusEl.className = 'status error';
  } finally {
    spinner.style.display = 'none';
    processBtn.disabled = false;
  }
});
</script>
</body>
</html>
