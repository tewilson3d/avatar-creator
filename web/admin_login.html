<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Avatar Pipeline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-box { background: #141414; border: 1px solid #222; border-radius: 16px; padding: 40px; width: 100%; max-width: 380px; }
  .login-box h1 { font-size: 20px; font-weight: 600; color: #fff; text-align: center; margin-bottom: 8px; }
  .login-box p { font-size: 13px; color: #666; text-align: center; margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; }
  .field input { width: 100%; padding: 12px 14px; background: #0d0d0d; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 14px; outline: none; transition: border-color 0.2s; }
  .field input:focus { border-color: #4f9eff; }
  .btn { width: 100%; padding: 12px; background: #4f9eff; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 8px; }
  .btn:hover { background: #3a8fee; }
  .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
  .status { text-align: center; font-size: 13px; margin-top: 16px; min-height: 20px; }
  .status.error { color: #ff5555; }
  .back { display: block; text-align: center; margin-top: 20px; color: #4f9eff; text-decoration: none; font-size: 13px; }
  .back:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="login-box">
  <h1>🔒 Admin Login</h1>
  <p>Avatar Pipeline Administration</p>
  <form id="loginForm" onsubmit="return doLogin(event)">
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit" id="loginBtn">→ Sign In</button>
  </form>
  <div class="status" id="status"></div>
  <a href="/" class="back">← Back to Pipeline</a>
</div>
<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.textContent = '';
  try {
    const resp = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      })
    });
    const data = await resp.json();
    if (data.success) {
      window.location.href = '/admin';
    } else {
      status.textContent = data.error || 'Invalid credentials';
      status.className = 'status error';
    }
  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    status.className = 'status error';
  } finally {
    btn.disabled = false;
  }
  return false;
}
</script>
</body>
</html>
